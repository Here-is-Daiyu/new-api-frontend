<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>New API 管理面板</title>
    <link rel="stylesheet" href="style.css" />
    <link id="dynamicFavicon" rel="icon" type="image/png" href="/favicon.ico" />
    <meta name="description" content="轻量级 New API 管理面板" />
  </head>
  <body>
    <div class="app-shell">
      <!-- 顶部导航栏 -->
      <header class="navbar backdrop-blur">
        <div class="navbar-content">
          <div class="brand">
            <svg class="icon-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="brand-text">
              <h1 class="text-gradient">New API 管理面板</h1>
              <span class="badge-version" id="versionText">v0.0.0</span>
            </div>
          </div>
          <div class="nav-actions">
            <button id="themeToggleBtn" class="btn-icon" aria-label="切换主题">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
              </svg>
              <svg class="icon-moon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="main-content">
        <!-- 全局通知区域 -->
        <div id="alertBox" class="alert-toast hidden" role="alert"></div>

        <!-- 登录前：连接配置与登录卡片 -->
        <div id="loginCard" class="auth-container card-fancy">
          <div class="card-header">
            <h2>欢迎回来</h2>
            <p class="subtitle">请配置服务器并登录以继续</p>
          </div>

          <div class="auth-form-group">
            <div class="input-group-merged">
              <div class="input-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
              </div>
              <input id="baseUrlInput" type="url" placeholder="API 地址 (例如 https://api.example.com)" />
              <button id="saveBaseUrlBtn" class="btn-ghost-primary" type="button">保存</button>
            </div>
            <p class="hint-text">所有请求将通过本地 <code>/proxy</code> 安全转发</p>
          </div>

          <form id="loginForm" class="auth-form">
            <div class="input-group">
              <label for="usernameInput">账号</label>
              <input id="usernameInput" type="text" autocomplete="username" placeholder="用户名或邮箱" required />
            </div>
            <div class="input-group">
              <label for="passwordInput">密码</label>
              <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入密码" required />
            </div>
            <button id="loginBtn" class="btn-primary w-full" type="submit">
              <span>立即登录</span>
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
            </button>
          </form>
        </div>

        <!-- 登录后：仪表盘 -->
        <div id="dashboard" class="dashboard-container hidden">
          <!-- 用户信息栏 -->
          <section class="user-bar card-glass">
            <div class="user-info">
              <div class="avatar-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              </div>
              <div class="user-details">
                <div id="userInfoText" class="user-meta">加载中...</div>
                <div class="user-status-dot">在线</div>
              </div>
            </div>
            <div class="user-actions">
              <span class="button-loading-wrap">
                <button id="refreshSelfBtn" class="btn-ghost" title="刷新状态" type="button">
                  <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
                <span class="button-loading-spinner" aria-hidden="true"></span>
              </span>
              <button id="logoutBtn" class="btn-ghost text-danger" title="退出登录">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
              </button>
            </div>
          </section>

          <!-- 功能选项卡 -->
          <div class="tabs-nav">
            <button class="tab-btn active" data-tab="tokenPanel" type="button">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              令牌管理
            </button>
            <button class="tab-btn" data-tab="modelPanel" type="button">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 2l9 4.5-9 4.5-9-4.5L12 2z"></path><path d="M3 12l9 4.5 9-4.5"></path><path d="M3 17.5L12 22l9-4.5"></path></svg>
              可用模型
            </button>
            <button class="tab-btn" data-tab="logPanel" type="button">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              日志审计
            </button>
          </div>

          <!-- Token 面板 -->
          <section id="tokenPanel" class="tab-panel card-content show">
            <div class="panel-header">
              <div class="panel-title">
                <h3>访问令牌</h3>
                <span class="badge-count" id="tokenTotalBadge">-</span>
              </div>
              <div class="panel-actions">
                <span class="button-loading-wrap">
                  <button id="refreshTokenBtn" class="btn-secondary btn-sm" type="button">刷新</button>
                  <span class="button-loading-spinner" aria-hidden="true"></span>
                </span>
                <button id="createTokenBtn" class="btn-primary btn-sm" type="button">
                  <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                  新建
                </button>
              </div>
            </div>

            <form id="tokenFilterForm" class="filter-bar">
              <input id="tokenKeywordInput" class="input-sm" type="text" placeholder="搜索名称或 Key..." />
              <div id="tokenPageSizeSelect" class="custom-select custom-select-sm" aria-label="Token 每页条数下拉"></div>
              <button class="btn-ghost btn-sm" type="submit">查询</button>
              <button id="tokenFilterResetBtn" class="btn-ghost btn-sm" type="button">重置</button>
            </form>

            <div class="table-responsive">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th width="60">ID</th>
                    <th>名称</th>
                    <th>Key</th>
                    <th width="80">状态</th>
                    <th>额度</th>
                    <th>过期时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="tokenTableBody">
                  <!-- JS 填充 -->
                </tbody>
              </table>
            </div>

            <div class="pagination">
              <button id="tokenPrevBtn" class="btn-icon-sm" type="button" disabled>
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
              </button>
              <span id="tokenPagerText" class="page-info">1 / 1</span>
              <button id="tokenNextBtn" class="btn-icon-sm" type="button" disabled>
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
            </div>
          </section>

          <!-- 模型面板 -->
          <section id="modelPanel" class="tab-panel card-content hidden">
            <div class="panel-header">
              <div class="panel-title">
                <h3>可用模型</h3>
                <span class="badge-count" id="modelTotalBadge">-</span>
              </div>
              <span class="button-loading-wrap">
                <button id="refreshModelBtn" class="btn-secondary btn-sm" type="button">刷新</button>
                <span class="button-loading-spinner" aria-hidden="true"></span>
              </span>
            </div>

            <form id="modelFilterForm" class="filter-bar">
              <div id="modelApiKeySelect" class="custom-select custom-select-sm" aria-label="模型 API Key 下拉"></div>
              <button class="btn-primary btn-sm" type="submit">拉取模型列表</button>
            </form>

            <div class="table-responsive">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th width="60">序号</th>
                    <th>模型 ID</th>
                    <th width="180">所属方</th>
                    <th>支持端点</th>
                  </tr>
                </thead>
                <tbody id="modelTableBody">
                  <!-- JS 填充 -->
                </tbody>
              </table>
            </div>
          </section>

          <!-- 日志面板 -->
          <section id="logPanel" class="tab-panel card-content hidden">
            <div class="panel-header">
              <div class="panel-title">
                <h3>调用日志</h3>
              </div>
              <span class="button-loading-wrap">
                <button id="refreshLogBtn" class="btn-secondary btn-sm" type="button">刷新</button>
                <span class="button-loading-spinner" aria-hidden="true"></span>
              </span>
            </div>

            <div class="stats-grid" id="logStatBox">
              <div class="stat-card">
                <span class="stat-label">总消耗</span>
                <strong id="statQuota" class="stat-value">0</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">RPM</span>
                <strong id="statRpm" class="stat-value">0</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">TPM</span>
                <strong id="statTpm" class="stat-value">0</strong>
              </div>
            </div>

            <form id="logFilterForm" class="filter-grid">
              <div id="logTypeSelect" class="custom-select custom-select-sm" aria-label="日志类型下拉"></div>
              <div id="logTokenNameInput" class="custom-select custom-select-sm" aria-label="日志 Token 下拉"></div>
              <div id="logModelSelect" class="custom-select custom-select-sm" aria-label="日志模型下拉"></div>
              <input id="logRequestIdInput" class="input-sm" type="text" placeholder="Req ID" />
              <input id="logStartInput" class="input-sm" type="text" placeholder="开始时间（如 2026-02-24 13:00:00）" />
              <input id="logEndInput" class="input-sm" type="text" placeholder="结束时间（如 2026-02-24 14:00:00）" />
              <div id="logGroupSelect" class="custom-select custom-select-sm" aria-label="日志分组下拉"></div>
              <p id="logGroupHint" class="filter-hint hidden"></p>
              <div class="filter-actions">
                <button class="btn-primary btn-sm" type="submit">筛选</button>
                <button id="logFilterResetBtn" class="btn-ghost btn-sm" type="button">重置</button>
              </div>
            </form>

            <div class="table-responsive log-table-wrap" id="logTableWrap">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th width="140">时间</th>
                    <th width="80">类型</th>
                    <th>模型</th>
                    <th>Token</th>
                    <th width="90">输入</th>
                    <th width="110">输出</th>
                    <th width="90">耗时</th>
                    <th width="90">首字</th>
                    <th width="120">输出速率(token/s)</th>
                    <th>详情</th>
                  </tr>
                </thead>
                <tbody id="logTableBody">
                  <!-- JS 填充 -->
                </tbody>
              </table>
            </div>

            <div id="logLoadState" class="load-more-trigger">
              滚动加载更多
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- 模态框：新建/编辑 Token -->
    <div id="tokenModal" class="modal-overlay hidden">
      <div class="modal-dialog">
        <div class="modal-header">
          <h3 id="tokenModalTitle">配置令牌</h3>
          <button id="closeTokenModalBtn" class="btn-close" type="button">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>

        <form id="tokenForm" class="modal-body">
          <input id="tokenIdInput" type="hidden" />

          <div class="form-grid">
            <div class="form-group span-2">
              <label>名称 <span class="required">*</span></label>
              <input id="tokenNameInput" class="input-std" type="text" maxlength="50" required placeholder="譬如：测试 Key" />
            </div>

             <div class="form-group">
                <label>过期时间</label>
                <input
                  id="tokenExpireInput"
                  class="input-std"
                  type="text"
                  placeholder="例如 2026-02-24 13:00:00"
                />
             </div>

              <div class="form-group">
               <label>状态</label>
               <div id="tokenStatusSelect" class="custom-select custom-select-sm" aria-label="Token 状态下拉"></div>
             </div>

            <div class="form-group span-2 quota-group">
              <label>额度</label>
              <div class="quota-input-wrapper">
                <input id="tokenQuotaInput" class="input-std" type="number" min="0" step="1" value="0" />
                <label class="checkbox-wrapper">
                  <input id="tokenUnlimitedInput" type="checkbox" />
                  <span>无限额度</span>
                </label>
              </div>
            </div>

            <div class="form-group span-2">
              <div class="group-header">
                <label class="checkbox-wrapper">
                  <input id="tokenModelLimitEnabledInput" type="checkbox" />
                  <span>启用模型限制</span>
                </label>
              </div>
              <textarea id="tokenModelLimitsInput" class="input-std" rows="2" placeholder="模型名称用逗号分隔，如 gpt-4,claude-3"></textarea>
            </div>

            <div class="form-group span-2">
              <label>IP 白名单</label>
              <textarea id="tokenAllowIpsInput" class="input-std" rows="2" placeholder="每行一个 IP，留空不限制"></textarea>
            </div>

            <div class="form-group">
              <label>用户分组</label>
              <input id="tokenGroupInput" class="input-std" type="text" placeholder="default" />
            </div>

            <div class="form-group flex-center">
              <label class="checkbox-wrapper">
                <input id="tokenCrossGroupRetryInput" type="checkbox" />
                <span>跨分组重试</span>
              </label>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn-primary w-full" id="saveTokenBtn" type="submit">保存配置</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
